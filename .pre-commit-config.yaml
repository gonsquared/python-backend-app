repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest
        language: system
        pass_filenames: false

      - id: compileall
        name: compileall
        entry: .venv/bin/python -m compileall app seeders tests
        language: system
        pass_filenames: false
